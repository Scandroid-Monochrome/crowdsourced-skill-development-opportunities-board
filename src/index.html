<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Crowdsourced Opportunities Board</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <style>
    body {
      background-color: lightblue;
      font-family: google-sans, sans-serif;
      flex-direction: column;
      display: flex;
      position: relative;
    }

    button {
      background-color: lightgray;
      border: 1px solid darkslategray;
      padding: 10px 20px;
      text-align: center;
      font-weight: bold;
      display: inline-block;
      font-size: 20px;
      cursor: pointer;
      border-radius: 20px;
    }

    input, textarea {
      border-radius: 5px;
      border: 1px solid darkslategray;
      padding: 5px;
      font-size: 16px;
    }

    select {
      font-size: 20px;
      border-radius: 5px;
      background: lightgray;
    }

    div {
      border-radius: 20px;
    }
  </style>
</head>
<body>
  <app-root></app-root>
</body>
</html>
